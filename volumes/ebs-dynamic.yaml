apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ebs-dynamic
spec:
  accessMode:
    - ReadWriteOnce
  storageClassName: roboshop-ebs
  resources:
    requests:
      storage: 6Gi
---
apiVersion: v1
kind: Pod
metadata: 
  name: ebs-dynamic
spec:
  containers:
  - name: nginx
    image: nginx
    volumeMounts:
    - name: persistance-storage
      mountPath: /usr/share/nginx/html`
  volumes:
  - name: persistent-storage
    persistentVolumeClaim:
      claimName: ebs-dynamic